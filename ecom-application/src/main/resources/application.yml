spring:
  application:
    name: ecom-application

  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    url: jdbc:h2:mem:test
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    show-sql: true

server:
  port: 8080

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create
  server:
   port: 8080

management:
    endpoints:
      web:
        exposure:
          include: '*'
    endpoint:
      health:
        show=details: always
    info:
      env:
        enabled: true

info:
  app:
  name: MyNewApp
  description: App built by us
  version: 1.0.0



