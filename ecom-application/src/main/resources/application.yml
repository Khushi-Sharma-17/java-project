spring:
  application:
    name: ecom-application


  datasource:
    url: jdbc:postgresql://localhost:5432/ksharma?currentSchema=public&options=-c%20TimeZone=Asia/Kolkata
    username: ksharma
    password: ksharma
    driver-class-name: org.postgresql.Driver


  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

info:
  app:
    name: MyNewApp





